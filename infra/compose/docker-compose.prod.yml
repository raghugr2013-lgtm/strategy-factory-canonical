# ──────────────────────────────────────────────────────────────────
# Strategy Factory — Production Docker Compose
# Consolidated stack: backend + vie + frontend + (external shared
# Caddy reverse proxy, MongoDB, Redis, Prometheus, Grafana, Loki, Promtail).
#
# Target: Ubuntu 24.04 VPS on `vqb-network` (external).
#
# Reverse proxy: The VPS runs **Caddy** (not Traefik). Caddy terminates
# TLS on :443 and reverse-proxies /api/* to factory-backend:8001 via
# the `vqb-network`. Caddy must be attached to `vqb-network` so it can
# resolve the `factory-backend` DNS alias. See `infra/caddy/README.md`.
#
# The `traefik.*` labels emitted per service are RESERVED for a
# possible future Traefik migration — they are INERT under Caddy and
# have no runtime effect on the current deployment.
#
# ─── CANONICAL INVOCATION ─────────────────────────────────────────
# Always run from the **repository root** and always pass an explicit
# `--env-file`. The prefer path is the wrapper `infra/scripts/compose.sh`
# which locates the repo root + `.env` no matter where you invoke it
# from, or the higher-level `infra/scripts/deploy.sh` for a full deploy.
#
#   # from repo root (canonical):
#   docker compose --env-file .env -f infra/compose/docker-compose.prod.yml build
#   docker compose --env-file .env -f infra/compose/docker-compose.prod.yml up -d
#   ./infra/scripts/health.sh
#
#   # from anywhere (wrapper resolves paths):
#   ./infra/scripts/compose.sh build
#   ./infra/scripts/compose.sh up -d
#   ./infra/scripts/compose.sh logs -f factory-backend
#
# ⚠ DO NOT `cd infra/compose && docker compose -f docker-compose.prod.yml …`
# — docker compose loads `.env` from the current working directory when
# `--env-file` is omitted, so this variant reads a non-existent
# `infra/compose/.env` and every interpolation resolves to empty.
# Historical bug: caused SHARED_MONGO_URL + JWT_SECRET to be empty on a
# VPS boot on 2026-07-22; backend refused to start. Guarded below via
# `${VAR:?…}` interpolation errors — see comments on each guarded line.
# ──────────────────────────────────────────────────────────────────

services:

  factory-backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-1.1.0}
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ${FACTORY_IMAGE_REPO:-strategy-factory}/backend:${FACTORY_IMAGE_TAG:-1.1.0}
    container_name: factory-backend
    restart: unless-stopped
    depends_on:
      factory-vie:
        condition: service_healthy
    environment:
      CONFIG_VERSION: ${CONFIG_VERSION:-1}
      # ⚠ Interpolation guards: if any of these resolve to empty (e.g.
      # `docker compose` was invoked from the wrong directory and `.env`
      # was not picked up), compose fails at YAML parse time with the
      # message below — BEFORE any container starts. This replaces the
      # historical failure mode where the backend booted with empty
      # MONGO_URL/JWT_SECRET and crashed on first request.
      MONGO_URL: ${SHARED_MONGO_URL:?SHARED_MONGO_URL is empty — pass --env-file /path/to/.env or use infra/scripts/compose.sh (see docker-compose.prod.yml top-of-file)}
      DB_NAME: ${FACTORY_DB_NAME:-strategy_factory_v1}
      REDIS_URL: ${SHARED_REDIS_URL:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is empty — pass --env-file /path/to/.env or use infra/scripts/compose.sh (see docker-compose.prod.yml top-of-file)}
      JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN:-60}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is empty — pass --env-file /path/to/.env or use infra/scripts/compose.sh}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is empty — pass --env-file /path/to/.env or use infra/scripts/compose.sh}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      VIE_URL: http://factory-vie:8100
      VIE_TIMEOUT_S: "60"
      BUILD_VERSION: ${BUILD_VERSION:-1.1.0}
      BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
      BUILD_DATE: ${BUILD_DATE:-unknown}
      # ── Feature flags ────────────────────────────────────────────
      # Must be enumerated here (not just present in `.env`) because
      # docker-compose `--env-file` only supplies interpolation values
      # — variables absent from this `environment:` block never enter
      # the container's os.environ. Backend reads these via
      # backend/app/core/config.py:_bool_env (default False), so an
      # omitted flag silently disables the feature at boot. Kept in
      # sync with dev overlay (docker-compose.yml, lines 83-85) and
      # the factory-runner service in this file (lines 176-177).
      ENABLE_LEGACY_ROUTERS: ${ENABLE_LEGACY_ROUTERS:-true}
      ENABLE_FACTORY_RUNNER: ${ENABLE_FACTORY_RUNNER:-true}
      ENABLE_DYNAMIC_MARKET_UNIVERSE: ${ENABLE_DYNAMIC_MARKET_UNIVERSE:-false}
      # ── Phase 1 autonomous-factory activation flags ──────────────
      # Defaults preserve prior behaviour (all activation gates OFF).
      # Flip on in the production .env to activate the recovered
      # sibling factory-runner + Unified Autonomous Orchestrator.
      # OBSERVE mode remains the shipping default for every mutating
      # engine — activation surfaces read paths only.
      # Docs: docs/PHASE_1_ACTIVATION_PLAN.md · docs/AUTONOMOUS_CYCLE_HEALTH_DASHBOARD.md
      # FACTORY_RUNNER_OWNS_SCHEDULERS is enumerated here (in addition
      # to the factory-runner service) so both services see the same
      # activation surface — backend workers short-circuit their
      # scheduler-restore paths on this flag.
      FACTORY_RUNNER_OWNS_SCHEDULERS: ${FACTORY_RUNNER_OWNS_SCHEDULERS:-false}
      ORCHESTRATOR_ENABLED: ${ORCHESTRATOR_ENABLED:-false}
      LEARNING_SCHEDULER_ENABLED: ${LEARNING_SCHEDULER_ENABLED:-false}
      LEARNING_CONTINUOUS_MODE: ${LEARNING_CONTINUOUS_MODE:-false}
      LEARNING_CONTINUOUS_PAIR: ${LEARNING_CONTINUOUS_PAIR:-EURUSD}
      LEARNING_CONTINUOUS_TIMEFRAME: ${LEARNING_CONTINUOUS_TIMEFRAME:-H1}
      LEARNING_CONTINUOUS_STYLE: ${LEARNING_CONTINUOUS_STYLE:-trend-following}
      BUDGET_PERSIST: ${BUDGET_PERSIST:-false}
      MI_ENABLED: ${MI_ENABLED:-false}
      # Meta-learning + factory-eval STAY in OBSERVE by contract.
      META_LEARNING_MODE: ${META_LEARNING_MODE:-observe}
      FACTORY_EVAL_MODE: ${FACTORY_EVAL_MODE:-observe}
      # Execution engine remains OFF — live trading is deliberately
      # not enabled by Phase 1 activation.
      EXEC_ENABLED: ${EXEC_ENABLED:-false}
    networks:
      vqb-network:
        aliases:
          - factory-backend
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=vqb-network"
      - "traefik.http.routers.factory-api.rule=Host(`${FACTORY_DOMAIN}`) && (PathPrefix(`/api`))"
      - "traefik.http.routers.factory-api.entrypoints=${TRAEFIK_WEBSECURE_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.factory-api.tls=true"
      - "traefik.http.routers.factory-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.factory-api.priority=100"
      - "traefik.http.routers.factory-api.service=factory-api"
      - "traefik.http.services.factory-api.loadbalancer.server.port=8001"
      - "prometheus.scrape=true"
      - "prometheus.service=factory-backend"
      - "logging=promtail"
      - "loki_service=factory-backend"

  factory-vie:
    build:
      context: ../../vie
      dockerfile: Dockerfile
    image: ${FACTORY_IMAGE_REPO:-strategy-factory}/vie:${FACTORY_IMAGE_TAG:-1.1.0}
    container_name: factory-vie
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      KIMI_MODEL: ${KIMI_MODEL:-kimi-k2}
    networks:
      - vqb-network
    expose:
      - "8100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.service=factory-vie"
      - "logging=promtail"
      - "loki_service=factory-vie"

  factory-frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    image: ${FACTORY_IMAGE_REPO:-strategy-factory}/frontend:${FACTORY_IMAGE_TAG:-1.1.0}
    container_name: factory-frontend
    restart: unless-stopped
    networks:
      - vqb-network
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --timeout=3 http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=vqb-network"
      - "traefik.http.routers.factory-ui.rule=Host(`${FACTORY_DOMAIN}`)"
      - "traefik.http.routers.factory-ui.entrypoints=${TRAEFIK_WEBSECURE_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.factory-ui.tls=true"
      - "traefik.http.routers.factory-ui.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.factory-ui.priority=10"
      - "traefik.http.routers.factory-ui.service=factory-ui"
      - "traefik.http.services.factory-ui.loadbalancer.server.port=80"
      - "prometheus.scrape=true"
      - "prometheus.service=factory-frontend"
      - "logging=promtail"
      - "loki_service=factory-frontend"

  # ──────────────────────────────────────────────────────────────
  # Canonical scheduler sibling — always on (per approved plan).
  # Owns APScheduler-driven jobs from legacy/factory_runner.py.
  # Boots as a heartbeat-only stub in Phase 0; picks up real work
  # once Phase 5 (Factory Supervisor) is recovered.
  # ──────────────────────────────────────────────────────────────
  factory-runner:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-1.1.0}
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ${FACTORY_IMAGE_REPO:-strategy-factory}/backend:${FACTORY_IMAGE_TAG:-1.1.0}
    container_name: factory-runner
    restart: unless-stopped
    depends_on:
      factory-backend:
        condition: service_healthy
    environment:
      CONFIG_VERSION: ${CONFIG_VERSION:-1}
      # ⚠ Same interpolation guard as factory-backend — see top-of-file.
      MONGO_URL: ${SHARED_MONGO_URL:?SHARED_MONGO_URL is empty — pass --env-file /path/to/.env or use infra/scripts/compose.sh (see docker-compose.prod.yml top-of-file)}
      DB_NAME: ${FACTORY_DB_NAME:-strategy_factory_v1}
      VIE_URL: http://factory-vie:8100
      VIE_TIMEOUT_S: "60"
      ENABLE_LEGACY_ROUTERS: ${ENABLE_LEGACY_ROUTERS:-true}
      ENABLE_FACTORY_RUNNER: ${ENABLE_FACTORY_RUNNER:-true}
      # ── Phase 1 autonomous-factory activation flags ──────────────
      # Runner needs the same activation surface as the backend so
      # subordinate schedulers restore correctly when
      # FACTORY_RUNNER_OWNS_SCHEDULERS=true. Defaults preserve prior
      # heartbeat-only behaviour. See docs/PHASE_1_ACTIVATION_PLAN.md.
      FACTORY_RUNNER_OWNS_SCHEDULERS: ${FACTORY_RUNNER_OWNS_SCHEDULERS:-false}
      # ── Phase 1b Factory Supervisor (APScheduler) ────────────────
      # New third dispatch mode in app/runner.py. Defaults to false so
      # current heartbeat / legacy behaviour is preserved. Flip to
      # "true" to activate the 5 recurring placeholder jobs
      # (orchestrator / mutation / factory_eval / meta_learning /
      # governance). Optional 5-field crontab overrides let ops tune
      # cadence without a code change. See app/factory_supervisor.py.
      FACTORY_SUPERVISOR_ENABLED: ${FACTORY_SUPERVISOR_ENABLED:-false}
      SUPERVISOR_ORCHESTRATOR_CRON: ${SUPERVISOR_ORCHESTRATOR_CRON:-}
      SUPERVISOR_MUTATION_CRON: ${SUPERVISOR_MUTATION_CRON:-}
      SUPERVISOR_FACTORY_EVAL_CRON: ${SUPERVISOR_FACTORY_EVAL_CRON:-}
      SUPERVISOR_META_LEARNING_CRON: ${SUPERVISOR_META_LEARNING_CRON:-}
      SUPERVISOR_GOVERNANCE_CRON: ${SUPERVISOR_GOVERNANCE_CRON:-}
      ORCHESTRATOR_ENABLED: ${ORCHESTRATOR_ENABLED:-false}
      LEARNING_SCHEDULER_ENABLED: ${LEARNING_SCHEDULER_ENABLED:-false}
      LEARNING_CONTINUOUS_MODE: ${LEARNING_CONTINUOUS_MODE:-false}
      LEARNING_CONTINUOUS_PAIR: ${LEARNING_CONTINUOUS_PAIR:-EURUSD}
      LEARNING_CONTINUOUS_TIMEFRAME: ${LEARNING_CONTINUOUS_TIMEFRAME:-H1}
      LEARNING_CONTINUOUS_STYLE: ${LEARNING_CONTINUOUS_STYLE:-trend-following}
      BUDGET_PERSIST: ${BUDGET_PERSIST:-false}
      MI_ENABLED: ${MI_ENABLED:-false}
      META_LEARNING_MODE: ${META_LEARNING_MODE:-observe}
      FACTORY_EVAL_MODE: ${FACTORY_EVAL_MODE:-observe}
      EXEC_ENABLED: ${EXEC_ENABLED:-false}
      FACTORY_RUNNER_HEARTBEAT_SEC: ${FACTORY_RUNNER_HEARTBEAT_SEC:-300}
    command: ["python", "-m", "app.runner"]
    networks:
      - vqb-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/factory_runner.hb || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    volumes:
      - factory_bi5:/app/data/bi5
    labels:
      - "prometheus.scrape=true"
      - "prometheus.service=factory-runner"
      - "logging=promtail"
      - "loki_service=factory-runner"

volumes:
  factory_bi5:
    driver: local

networks:
  vqb-network:
    external: true
