# ──────────────────────────────────────────────────────────────────
# Strategy Factory — Production Docker Compose
# Consolidated stack: backend + vie + frontend + (external shared
# Caddy reverse proxy, MongoDB, Redis, Prometheus, Grafana, Loki, Promtail).
#
# Target: Ubuntu 24.04 VPS on `vqb-network` (external).
#
# Reverse proxy: The VPS runs **Caddy** (not Traefik). Caddy terminates
# TLS on :443 and reverse-proxies /api/* to factory-backend:8001 via
# the `vqb-network`. Caddy must be attached to `vqb-network` so it can
# resolve the `factory-backend` DNS alias. See `infra/caddy/README.md`.
#
# The `traefik.*` labels emitted per service are RESERVED for a
# possible future Traefik migration — they are INERT under Caddy and
# have no runtime effect on the current deployment.
#
# Bring up:
#   docker compose --env-file .env -f infra/compose/docker-compose.prod.yml build
#   docker compose --env-file .env -f infra/compose/docker-compose.prod.yml up -d
#   ./infra/scripts/health.sh
# ──────────────────────────────────────────────────────────────────

services:

  factory-backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ${FACTORY_IMAGE_REPO:-strategy-factory}/backend:${FACTORY_IMAGE_TAG:-1.0.0}
    container_name: factory-backend
    restart: unless-stopped
    depends_on:
      factory-vie:
        condition: service_healthy
    environment:
      CONFIG_VERSION: ${CONFIG_VERSION:-1}
      MONGO_URL: ${SHARED_MONGO_URL}
      DB_NAME: ${FACTORY_DB_NAME:-strategy_factory_v1}
      REDIS_URL: ${SHARED_REDIS_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN:-60}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      VIE_URL: http://factory-vie:8100
      VIE_TIMEOUT_S: "60"
      BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
      BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
      BUILD_DATE: ${BUILD_DATE:-unknown}
      # ── Feature flags ────────────────────────────────────────────
      # Must be enumerated here (not just present in `.env`) because
      # docker-compose `--env-file` only supplies interpolation values
      # — variables absent from this `environment:` block never enter
      # the container's os.environ. Backend reads these via
      # backend/app/core/config.py:_bool_env (default False), so an
      # omitted flag silently disables the feature at boot. Kept in
      # sync with dev overlay (docker-compose.yml, lines 83-85) and
      # the factory-runner service in this file (lines 176-177).
      ENABLE_LEGACY_ROUTERS: ${ENABLE_LEGACY_ROUTERS:-true}
      ENABLE_FACTORY_RUNNER: ${ENABLE_FACTORY_RUNNER:-true}
      ENABLE_DYNAMIC_MARKET_UNIVERSE: ${ENABLE_DYNAMIC_MARKET_UNIVERSE:-false}
    networks:
      vqb-network:
        aliases:
          - factory-backend
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=vqb-network"
      - "traefik.http.routers.factory-api.rule=Host(`${FACTORY_DOMAIN}`) && (PathPrefix(`/api`))"
      - "traefik.http.routers.factory-api.entrypoints=${TRAEFIK_WEBSECURE_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.factory-api.tls=true"
      - "traefik.http.routers.factory-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.factory-api.priority=100"
      - "traefik.http.routers.factory-api.service=factory-api"
      - "traefik.http.services.factory-api.loadbalancer.server.port=8001"
      - "prometheus.scrape=true"
      - "prometheus.service=factory-backend"
      - "logging=promtail"
      - "loki_service=factory-backend"

  factory-vie:
    build:
      context: ../../vie
      dockerfile: Dockerfile
    image: ${FACTORY_IMAGE_REPO:-strategy-factory}/vie:${FACTORY_IMAGE_TAG:-1.0.0}
    container_name: factory-vie
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      KIMI_MODEL: ${KIMI_MODEL:-kimi-k2}
    networks:
      - vqb-network
    expose:
      - "8100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.service=factory-vie"
      - "logging=promtail"
      - "loki_service=factory-vie"

  factory-frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    image: ${FACTORY_IMAGE_REPO:-strategy-factory}/frontend:${FACTORY_IMAGE_TAG:-1.0.0}
    container_name: factory-frontend
    restart: unless-stopped
    networks:
      - vqb-network
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --timeout=3 http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=vqb-network"
      - "traefik.http.routers.factory-ui.rule=Host(`${FACTORY_DOMAIN}`)"
      - "traefik.http.routers.factory-ui.entrypoints=${TRAEFIK_WEBSECURE_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.factory-ui.tls=true"
      - "traefik.http.routers.factory-ui.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.factory-ui.priority=10"
      - "traefik.http.routers.factory-ui.service=factory-ui"
      - "traefik.http.services.factory-ui.loadbalancer.server.port=80"
      - "prometheus.scrape=true"
      - "prometheus.service=factory-frontend"
      - "logging=promtail"
      - "loki_service=factory-frontend"

  # ──────────────────────────────────────────────────────────────
  # Canonical scheduler sibling — always on (per approved plan).
  # Owns APScheduler-driven jobs from legacy/factory_runner.py.
  # Boots as a heartbeat-only stub in Phase 0; picks up real work
  # once Phase 5 (Factory Supervisor) is recovered.
  # ──────────────────────────────────────────────────────────────
  factory-runner:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-1.1.0}
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ${FACTORY_IMAGE_REPO:-strategy-factory}/backend:${FACTORY_IMAGE_TAG:-1.1.0}
    container_name: factory-runner
    restart: unless-stopped
    depends_on:
      factory-backend:
        condition: service_healthy
    environment:
      CONFIG_VERSION: ${CONFIG_VERSION:-1}
      MONGO_URL: ${SHARED_MONGO_URL}
      DB_NAME: ${FACTORY_DB_NAME:-strategy_factory_v1}
      VIE_URL: http://factory-vie:8100
      VIE_TIMEOUT_S: "60"
      ENABLE_LEGACY_ROUTERS: ${ENABLE_LEGACY_ROUTERS:-true}
      ENABLE_FACTORY_RUNNER: ${ENABLE_FACTORY_RUNNER:-true}
    command: ["python", "-m", "app.runner"]
    networks:
      - vqb-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/factory_runner.hb || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    volumes:
      - factory_bi5:/app/data/bi5
    labels:
      - "prometheus.scrape=true"
      - "prometheus.service=factory-runner"
      - "logging=promtail"
      - "loki_service=factory-runner"

volumes:
  factory_bi5:
    driver: local

networks:
  vqb-network:
    external: true
