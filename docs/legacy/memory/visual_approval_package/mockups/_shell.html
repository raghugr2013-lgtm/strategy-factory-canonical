<!--
  SHARED SHELL SNIPPET — DO NOT RENDER DIRECTLY.
  Copy/paste into each screen mockup. Set the active tab class.
-->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark">⚡</span>
      <span class="brand-name">AI Strategy Factory</span>
      <span class="brand-ver">v10</span>
    </div>
    <nav class="navbar">
      <button class="tab" data-id="dashboard">Dashboard</button>
      <button class="tab" data-id="execution">Execution</button>
      <button class="tab" data-id="auto-factory">Auto Factory</button>
      <button class="tab" data-id="monitoring">Monitoring</button>
      <button class="tab" data-id="paper-exec">Paper Exec</button>
      <button class="tab" data-id="trade-runner">Trade Runner</button>
      <button class="tab" data-id="portfolio-builder">Portfolio</button>
      <button class="tab" data-id="explorer">Explorer</button>
      <button class="tab" data-id="data">Market Data</button>
      <button class="tab" data-id="auto-select">Auto Select</button>
      <button class="tab" data-id="admin-users">Admin</button>
      <button class="tab more">More ▾</button>
    </nav>
    <div class="topbar-right">
      <button class="icon-btn" title="Trader Mode">⊞</button>
      <button class="icon-btn" title="Theme">☾</button>
      <button class="icon-btn" title="Density">↕</button>
      <button class="icon-btn" title="Notifications (⌘⌥N)">🔔<span class="badge">3</span></button>
      <button class="icon-btn" title="Copilot (⌘J)">💬</button>
      <div class="user-badge">● admin@strategy…</div>
      <button class="icon-btn" title="Sign out">⎋</button>
      <div class="online"><span class="dot-online"></span><span>ONLINE</span></div>
    </div>
  </div>
</header>

<footer class="statusrail">
  <div class="sr-cluster">
    <span class="sr-item"><span class="sr-dot ok"></span>orch:idle</span>
    <span class="sr-item"><span class="sr-dot ok"></span>ingest:ok</span>
    <span class="sr-item"><span class="sr-dot ok"></span>sched:on</span>
    <span class="sr-item"><span class="sr-dot off"></span>llm:off</span>
    <span class="sr-item"><span class="sr-dot ok"></span>gov:ok</span>
    <span class="sr-item"><span class="sr-dot ok"></span>kill:armed</span>
  </div>
  <div class="sr-cluster">
    <span class="sr-shortcut"><kbd>⌘K</kbd>command</span>
    <span class="sr-shortcut"><kbd>⌘J</kbd>copilot</span>
    <span class="sr-shortcut"><kbd>⌘⌥N</kbd>alerts</span>
    <span class="sr-shortcut"><kbd>⌘.</kbd>inspector</span>
    <span class="sr-shortcut"><kbd>?</kbd>shortcuts</span>
  </div>
</footer>
